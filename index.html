<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- iPhone Safari用 (Webクリップアイコン) -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
    <!-- Android Chrome用 (ホーム画面ショートカット/PWAアイコン) -->
    <link rel="icon" href="android-chrome-192.png" sizes="192x192" type="image/png">
    <!-- 共通ファビコン -->
    <link rel="icon" href="favicon.png" sizes="any">
    <title>振れ管計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .canvas-container {
            position: relative;
            height: 240px; 
            width: 100%;
            background: #0f172a;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }
        .result-zoom {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-start justify-center p-1 sm:p-2 font-sans overflow-x-hidden">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200 flex flex-col my-1">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 p-3 text-white text-center shrink-0">
            <h1 class="text-lg font-black tracking-tight">ダクト振れ管計算機</h1>
        </div>

        <div class="p-3 sm:p-4 space-y-3">
            
            <!-- Compact Visual Area -->
            <div class="canvas-container rounded-2xl shadow-inner overflow-hidden border border-slate-800">
                <div class="absolute top-2 left-2 flex gap-2 z-10">
                    <span id="angle-display" class="text-[9px] font-black text-white bg-blue-600 px-2 py-0.5 rounded-full shadow-lg opacity-90">---</span>
                </div>
                <canvas id="ductCanvas"></canvas>
            </div>

            <!-- Inputs and Results Section -->
            <div class="space-y-3">
                
                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="block text-[10px] font-black text-slate-500 uppercase ml-1">角度</label>
                        <select id="angleType" onchange="calculate()" class="w-full appearance-none bg-slate-50 border-2 border-slate-200 px-3 py-2 rounded-xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-bold text-slate-800 cursor-pointer text-sm">
                            <option value="45-45" selected>45° - 45°</option>
                            <option value="45-90">45° - 90°</option>
                            <option value="90-90">90° - 90°</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-black text-slate-500 uppercase ml-1">ダクト径 (Φ)</label>
                        <select id="diameter" onchange="calculate()" class="w-full appearance-none bg-slate-50 border-2 border-slate-200 px-3 py-2 rounded-xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-bold text-slate-800 cursor-pointer text-sm">
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="block text-[10px] font-black text-slate-500 uppercase ml-1">縦フレ (mm)</label>
                        <input type="number" id="vert" oninput="calculate()" placeholder="0" class="w-full bg-slate-50 border-2 border-slate-200 px-3 py-2 rounded-xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none text-xl font-black text-slate-800 transition-all placeholder:text-slate-300">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-black text-slate-500 uppercase ml-1">横フレ (mm)</label>
                        <input type="number" id="horiz" oninput="calculate()" placeholder="0" class="w-full bg-slate-50 border-2 border-slate-200 px-3 py-2 rounded-xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none text-xl font-black text-slate-800 transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <!-- Main Result -->
                <div id="result-container" class="bg-blue-600 rounded-2xl p-4 text-white shadow-xl shadow-blue-100 text-center relative overflow-hidden transition-all duration-300">
                    <div class="relative z-10">
                        <p class="text-[9px] font-black text-blue-100 mb-0.5 tracking-widest uppercase">単管長さ</p>
                        <div class="flex items-baseline justify-center">
                            <span id="res-pipe" class="text-6xl font-black tracking-tighter result-zoom leading-none">0</span>
                            <span class="text-xl font-bold ml-1.5">mm</span>
                        </div>
                    </div>
                </div>

                <!-- Sub Results -->
                <div class="grid grid-cols-3 gap-1.5 pb-1">
                    <div class="text-center bg-slate-50 p-2 rounded-xl border border-slate-100">
                        <p class="text-[8px] font-black text-slate-400 mb-0.5 uppercase">合成振れ</p>
                        <p class="text-base font-black text-slate-700"><span id="res-h">0</span><span class="text-[9px] ml-0.5">mm</span></p>
                    </div>
                    <div class="text-center bg-slate-50 p-2 rounded-xl border border-slate-100">
                        <p class="text-[8px] font-black text-slate-400 mb-0.5 uppercase leading-tight">ヒモ-ヒモ<br>(水平)</p>
                        <p class="text-base font-black text-slate-700"><span id="res-himo-himo-val">-</span><span class="text-[9px] ml-0.5">mm</span></p>
                    </div>
                    <div class="text-center bg-slate-50 p-2 rounded-xl border border-slate-100">
                        <p class="text-[8px] font-black text-slate-400 mb-0.5 uppercase leading-tight">ヒモ-芯<br>(水平)</p>
                        <p class="text-base font-black text-slate-700"><span id="res-himo-shin-val">-</span><span class="text-[9px] ml-0.5">mm</span></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('ductCanvas');
        const ctx = canvas.getContext('2d');
        const selectDiam = document.getElementById('diameter');
        
        for (let d = 75; d <= 350; d += 25) {
            const opt = document.createElement('option');
            opt.value = d;
            opt.textContent = d;
            if (d === 150) opt.selected = true;
            selectDiam.appendChild(opt);
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            calculate();
        }

        window.addEventListener('resize', resizeCanvas);

        function drawDuct(dia, type, pipeL, s1, s2, H, hasInput) {
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.width / dpr;
            const h = canvas.height / dpr;
            
            ctx.resetTransform();
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, w, h);
            
            const angle45Rad = 45 * Math.PI / 180;
            const cos45 = Math.cos(angle45Rad);
            const sin45 = Math.sin(angle45Rad);

            const visualPipeL = Math.max(0, pipeL);
            const totalPathLength = s1 + visualPipeL + s2;
            
            const margin = 35;
            let scale;
            if (type === "90-90") {
                scale = (h - (margin * 2)) / (totalPathLength + dia/2);
            } else {
                const totalProjX = totalPathLength * cos45;
                const totalProjY = totalPathLength * sin45;
                const scaleX = (w - (margin * 2)) / (totalProjX + dia);
                const scaleY = (h - (margin * 2)) / (totalProjY + dia);
                scale = Math.min(scaleX, scaleY);
            }
            
            scale = Math.min(scale, 0.55);

            const drawS1 = s1 * scale;
            const drawS2 = s2 * scale;
            const drawPipeL = visualPipeL * scale;
            const drawDia = dia * scale; 
            
            let startX, startY, endX, endY;
            if (type === "90-90") {
                startX = w / 2; 
                startY = (h + (drawS1 + drawPipeL + drawS2)) / 2;
                endX = startX;
                endY = startY - (drawS1 + drawPipeL + drawS2);
            } else {
                const totalProjX = (drawS1 + drawPipeL + drawS2) * cos45;
                const totalProjY = (drawS1 + drawPipeL + drawS2) * sin45;
                startX = (w - totalProjX) / 2;
                startY = (h + totalProjY) / 2;
                endX = startX + totalProjX;
                endY = startY - totalProjY;
            }

            // Grid
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 0.5;
            for(let i=0; i<w; i+=40) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke();
            }
            for(let i=0; i<h; i+=40) {
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(w,i); ctx.stroke();
            }

            if (type === "90-90") {
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(startX, endY);
                ctx.lineTo(endX, endY);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            ctx.lineCap = 'butt';
            ctx.lineJoin = 'round';
            ctx.lineWidth = drawDia;
            ctx.strokeStyle = '#3b82f6';

            ctx.beginPath();
            if (type === "90-90") {
                ctx.moveTo(startX - drawS1, startY);
                ctx.lineTo(startX, startY);
                ctx.lineTo(startX, endY);
                ctx.lineTo(startX + drawS2, endY);
            } else if (type === "45-45") {
                ctx.moveTo(startX - drawS1, startY);
                ctx.lineTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.lineTo(endX + drawS2, endY);
            } else if (type === "45-90") {
                ctx.moveTo(startX - drawS1, startY);
                ctx.lineTo(startX, startY);
                ctx.lineTo(endX, endY);
            }
            ctx.stroke();

            if (type === "45-90") {
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#60a5fa';
                ctx.fillStyle = '#0f172a';
                ctx.beginPath();
                ctx.arc(endX, endY, drawDia / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#ef4444';
                ctx.beginPath(); ctx.arc(endX, endY, 3, 0, Math.PI * 2); ctx.fill();
            }

            let p1, p2;
            if (type === "90-90") {
                p1 = { x: startX, y: startY - drawS1 };
                p2 = { x: startX, y: endY + drawS2 };
            } else {
                const dx = cos45, dy = -sin45;
                p1 = { x: startX + dx * drawS1, y: startY + dy * drawS1 };
                p2 = { x: endX - dx * drawS2, y: endY - dy * drawS2 };
            }

            const mSize = drawDia / 2 + 8;
            const markerColor = '#fbbf24';
            const drawMarker = (px, py, angleDeg) => {
                ctx.save();
                ctx.translate(px, py);
                ctx.rotate((angleDeg + 90) * Math.PI / 180);
                ctx.lineWidth = 3;
                ctx.strokeStyle = markerColor;
                ctx.beginPath(); ctx.moveTo(-mSize, 0); ctx.lineTo(mSize, 0); ctx.stroke();
                ctx.restore();
            };

            if (type === "90-90") {
                drawMarker(p1.x, p1.y, 270);
                drawMarker(p2.x, p2.y, 270);
            } else {
                drawMarker(p1.x, p1.y, -45);
                drawMarker(p2.x, p2.y, -45);
            }

            if (hasInput && (pipeL !== 0 || H > 0)) {
                const textValue = `${pipeL}mm`;
                ctx.font = '900 20px sans-serif'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let textX, textY;
                if (type === "90-90") {
                    textX = startX + drawDia/2 + 40;
                    textY = (p1.y + p2.y) / 2;
                } else {
                    const nx = sin45, ny = cos45;
                    textX = (p1.x + p2.x)/2 + nx*(drawDia/2 + 30);
                    textY = (p1.y + p2.y)/2 + ny*(drawDia/2 + 30);
                }

                const paddingH = 12;
                const metrics = ctx.measureText(textValue);
                const rectW = metrics.width + paddingH;
                const rectH = 28;
                
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
                ctx.fillStyle = pipeL < 0 ? '#ef4444' : '#fbbf24'; 
                ctx.beginPath();
                ctx.roundRect(textX - rectW/2, textY - rectH/2, rectW, rectH, 8);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = pipeL < 0 ? '#ffffff' : '#0f172a';
                ctx.fillText(textValue, textX, textY);
            }

            ctx.fillStyle = '#ef4444';
            ctx.beginPath(); ctx.arc(startX, startY, 4, 0, Math.PI * 2); ctx.fill();
            if (type !== "45-90") {
                ctx.beginPath(); ctx.arc(endX, endY, 4, 0, Math.PI * 2); ctx.fill();
            }
        }

        function calculate() {
            const angleType = document.getElementById('angleType').value;
            const diameter = parseFloat(document.getElementById('diameter').value);
            const vVal = document.getElementById('vert').value;
            const hVal = document.getElementById('horiz').value;
            
            document.getElementById('angle-display').innerText = angleType;

            const hasInput = (vVal !== "" || hVal !== "");
            const vert = parseFloat(vVal) || 0;
            const horiz = parseFloat(hVal) || 0;
            const H = Math.sqrt(Math.pow(vert, 2) + Math.pow(horiz, 2));

            let effectiveAngle = (angleType === "90-90") ? 90 : 45;
            const rad = effectiveAngle * (Math.PI / 180);
            let L = (effectiveAngle === 90) ? H : H / Math.sin(rad);

            const getShinsaki = (angle) => (angle === 90) ? diameter : diameter * 0.414;

            let s1 = 0, s2 = 0;
            if (angleType === "45-45") { s1 = s2 = getShinsaki(45); }
            else if (angleType === "45-90") { s1 = getShinsaki(45); s2 = getShinsaki(90); }
            else if (angleType === "90-90") { s1 = s2 = getShinsaki(90); }

            let pipeLength = Math.floor(L - (s1 + s2));
            if (!hasInput) pipeLength = 0;

            document.getElementById('res-h').innerText = Math.round(H);
            document.getElementById('res-pipe').innerText = pipeLength;

            let himoHimo = "-", himoShin = "-";
            if (hasInput) {
                if (angleType === "90-90") {
                    himoHimo = Math.floor(s1 + s2);
                    himoShin = Math.floor(s1);
                } else if (angleType === "45-45") {
                    himoHimo = Math.floor(H + s1 + s2);
                    himoShin = Math.floor(H + s1);
                } else if (angleType === "45-90") {
                    himoShin = Math.floor(H + s1);
                }
            }
            
            document.getElementById('res-himo-himo-val').innerText = himoHimo;
            document.getElementById('res-himo-shin-val').innerText = himoShin;

            const container = document.getElementById('result-container');
            if (pipeLength < 0 && hasInput) {
                container.className = 'bg-red-600 rounded-2xl p-4 text-white shadow-xl shadow-red-200 text-center relative overflow-hidden transition-all duration-300';
            } else {
                container.className = 'bg-blue-600 rounded-2xl p-4 text-white shadow-xl shadow-blue-200 text-center relative overflow-hidden transition-all duration-300';
            }

            drawDuct(diameter, angleType, pipeLength, s1, s2, H, hasInput);
        }

        window.onload = resizeCanvas;
    </script>
</body>
</html>
